{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-3">Borrow Book</h1>
<form method="post" class="content-panel form-panel">
    <div class="row g-3">
        <div class="col-md-5">
            <label class="form-label">Member</label>
            <select class="form-select" name="member_id" required>
                {% for member in members %}
                <option value="{{ member.id }}">{{ member.name }} - {{ member.email }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-5">
            <label class="form-label">Book</label>
            <select class="form-select" name="book_id" required>
                {% for book in books %}
                <option value="{{ book.id }}">{{ book.title }} - {{ book.quantity }} available</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">Days</label>
            <input class="form-control" type="number" min="1" name="days" value="14" required>
        </div>
    </div>
    <div class="mt-4">
        <button class="btn btn-primary" type="submit">Borrow</button>
    </div>
</form>
{% endblock %}
