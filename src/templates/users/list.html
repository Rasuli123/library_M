{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h1 class="h3 mb-1">Users</h1>
        <p class="text-muted mb-0">Create admins, librarians, and normal users.</p>
    </div>
    <a class="btn btn-primary" href="{{ url_for('users.add_user') }}">Add User</a>
</div>

<div class="content-panel table-responsive">
    <table class="table align-middle">
        <thead>
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Created</th>
            <th class="text-end">Actions</th>
        </tr>
        </thead>
        <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td><span class="badge text-bg-info">{{ user.role }}</span></td>
            <td>{{ user.created_at.strftime("%Y-%m-%d") }}</td>
            <td class="text-end">
                <a class="btn btn-sm btn-outline-primary" href="{{ url_for('users.edit_user', user_id=user.id) }}">Edit</a>
                <form method="post" action="{{ url_for('users.delete_user', user_id=user.id) }}" class="d-inline">
                    <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this user?')">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
