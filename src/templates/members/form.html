{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-3">{{ "Edit Member" if member else "Add Member" }}</h1>
<form method="post" class="content-panel form-panel">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Name</label>
            <input class="form-control" name="name" value="{{ member.name if member else '' }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" value="{{ member.email if member else '' }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone" value="{{ member.phone if member else '' }}">
        </div>
    </div>
    <div class="mt-4">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('members.list_members') }}">Cancel</a>
    </div>
</form>
{% endblock %}
